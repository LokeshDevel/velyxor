<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <rect id="bg" width="512" height="512" fill="#050508" />

    <!-- Gradient for Strokes -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#0075ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>

    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feGaussianBlur stdDeviation="40" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <use href="#bg" />

  <!-- Main Artboard with Glow -->
  <g filter="url(#glow)">
    
    <!-- Outer Keycap Border -->
    <path 
      d="M120 160 C120 120, 160 100, 200 100 L312 100 C352 100, 392 120, 392 160 L392 340 L340 412 C320 440, 290 440, 260 440 L160 440 C140 440, 120 420, 120 400 Z" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="12" 
      stroke-linejoin="round"
      stroke-linecap="round"
    />

    <!-- Inner Keycap Surface -->
    <path 
      d="M160 115 L352 115 C370 115, 380 125, 380 145 L380 320 C380 340, 360 350, 340 350 L180 350 C160 350, 140 340, 140 320 L140 145 C140 125, 150 115, 160 115 Z" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="8" 
      stroke-linejoin="round"
    />

    <!-- Keycap Bevel Lines -->
    <line x1="140" y1="330" x2="120" y2="400" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />
    <line x1="380" y1="330" x2="392" y2="340" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />
    <line x1="140" y1="350" x2="160" y2="440" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />
    <line x1="380" y1="350" x2="340" y2="412" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />

    <!-- Lightning Bolt -->
    <path 
      d="M275 140 L210 240 L260 240 L235 340 L315 220 L260 220 Z" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="10" 
      stroke-linejoin="round"
    />

  </g>
</svg>
